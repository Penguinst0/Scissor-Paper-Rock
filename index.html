<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>

    <h1>Rock Paper Scissor</h1>
 <div class="choices">
    <div class ="choice" id="rock">
        <img src="https://nationaltoday.com/wp-content/uploads/2021/08/National-Pet-Rock-Day-1200x834.jpg">
    </div>
    <div class="choice" id="paper">
        <img src="https://img.magnific.com/free-vector/hand-drawn-flat-paper-cartoon-illustration_23-2151358276.jpg">
    </div>
    <div class="choice" id="scissor">
        <img src="https://static.vecteezy.com/system/resources/previews/027/880/311/non_2x/scissors-character-in-70s-cartoon-style-vector.jpg">
    </div>
 </div> 


    <div class="score-board">
        <div class="score">
            <p id="your-score">0</p>
            <p>You</p>
        </div>

        <div class="score">
            <p id="computer-score">0</p>
            <p>Comp</p>
        </div>
    </div>

    <div class="message">
        <p id="msg">Play your move</p>
    </div>
</body>
<script src="my.js"></script>
</html>
